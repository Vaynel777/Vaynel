<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control - Master Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Liquid Glass Theme - Apple inspired */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #15152b 50%, #0f1425 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.5), transparent);
            border-radius: 50%;
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Header */
        .header {
            padding: 30px 40px;
            background: rgba(20, 20, 40, 0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(100, 150, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.warning { background: #f59f00; }
        .status-dot.error { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
        }

        /* Main content */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px;
        }

        /* KPI Row */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .kpi-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: glass-shine 3s infinite;
        }

        @keyframes glass-shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .kpi-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.1);
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
        }

        .kpi-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Deployments grid */
        .deployments-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .deployments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.15);
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:active {
            transform: translateY(-6px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .card-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
        }

        .card-status.degraded { background: #f59f00; }
        .card-status.offline { background: #ef4444; }

        .card-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .metric-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 700;
            color: #00d4ff;
            margin: 6px 0;
        }

        .metric-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .metric-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .metric-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #9d4edd);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .card-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: #64748b;
            position: relative;
            z-index: 1;
        }

        /* Events list */
        .events-section {
            margin-top: 40px;
        }

        .events-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .events-list {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            overflow: hidden;
        }

        .event-item {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .event-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-content {
            flex: 1;
        }

        .event-type {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .event-message {
            font-size: 14px;
            color: #f1f5f9;
            margin: 4px 0;
        }

        .event-time {
            font-size: 12px;
            color: #64748b;
            margin-left: 20px;
            white-space: nowrap;
        }

        .event-severity {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 12px;
        }

        .event-severity.warning {
            background: rgba(245, 159, 0, 0.2);
            color: #f59f00;
            border: 1px solid rgba(245, 159, 0, 0.3);
        }

        .event-severity.critical {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .deployments-grid {
                grid-template-columns: 1fr;
            }

            .kpi-row {
                grid-template-columns: 1fr 1fr;
            }

            .card-metrics {
                grid-template-columns: 1fr;
            }
        }

        /* Loading state */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Background particles -->
    <div class="particles-bg" id="particlesContainer"></div>

    <!-- Header -->
    <div class="header">
        <div class="logo">🎛️ Mission Control</div>
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot"></div>
                <span id="statusText">Initializing...</span>
            </div>
            <div class="status-item">
                <span id="syncStatus">Syncing...</span>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="container">
        <!-- KPI Row -->
        <div class="kpi-row">
            <div class="kpi-box">
                <div class="kpi-label">Total Cost (Month)</div>
                <div class="kpi-value">$<span id="totalCost">0.00</span></div>
            </div>
            <div class="kpi-box">
                <div class="kpi-label">Rate Limit Blocks (1h)</div>
                <div class="kpi-value"><span id="rateLimitBlocks">0</span></div>
            </div>
            <div class="kpi-box">
                <div class="kpi-label">Errors (1h)</div>
                <div class="kpi-value"><span id="totalErrors">0</span></div>
            </div>
            <div class="kpi-box">
                <div class="kpi-label">Deployments Online</div>
                <div class="kpi-value"><span id="deploymentsOnline">0</span>/<span id="deploymentsTotal">0</span></div>
            </div>
            <div class="kpi-box">
                <div class="kpi-label">Critical Alerts</div>
                <div class="kpi-value"><span id="criticalAlerts">0</span></div>
            </div>
            <div class="kpi-box">
                <div class="kpi-label">Avg Uptime</div>
                <div class="kpi-value"><span id="avgUptime">0</span>%</div>
            </div>
        </div>

        <!-- Deployments -->
        <div class="deployments-title">📦 Deployments Overview</div>
        <div class="deployments-grid" id="deploymentsContainer">
            <!-- Cards generated by JS -->
        </div>

        <!-- Recent Events -->
        <div class="events-section">
            <div class="events-title">🚨 Recent Critical Events</div>
            <div class="events-list" id="eventsContainer">
                <!-- Events generated by JS -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let dashboardData = null;

        // Initialize particles
        function initializeParticles() {
            const container = document.getElementById('particlesContainer');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 100 + 50;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 20 + 20) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        // Fetch dashboard data
        async function fetchDashboardData() {
            try {
                const response = await fetch(`${API_BASE}/dashboard`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                dashboardData = await response.json();
                updateUI();
                document.getElementById('statusText').textContent = 'Connected';
                document.getElementById('statusText').parentElement.querySelector('.status-dot').style.background = '#22c55e';
            } catch (error) {
                console.error('Failed to fetch dashboard:', error);
                document.getElementById('statusText').textContent = 'Offline';
                document.getElementById('statusText').parentElement.querySelector('.status-dot').style.background = '#ef4444';
            }
        }

        // Update UI with data
        function updateUI() {
            if (!dashboardData) return;

            // KPIs
            document.getElementById('totalCost').textContent = dashboardData.total_cost_month.toFixed(2);
            document.getElementById('rateLimitBlocks').textContent = dashboardData.total_rate_limit_blocks_hour;
            document.getElementById('totalErrors').textContent = dashboardData.total_errors_hour;
            document.getElementById('deploymentsTotal').textContent = dashboardData.deployments.length;

            const online = dashboardData.deployments.filter(d => d.status !== 'offline').length;
            document.getElementById('deploymentsOnline').textContent = online;

            const avgUptime = dashboardData.deployments.length > 0
                ? (dashboardData.deployments.reduce((sum, d) => sum + d.uptime_percent, 0) / dashboardData.deployments.length).toFixed(0)
                : 0;
            document.getElementById('avgUptime').textContent = avgUptime;

            const criticalCount = dashboardData.critical_events.filter(e => e.severity === 'critical').length;
            document.getElementById('criticalAlerts').textContent = criticalCount;

            // Deployments cards
            renderDeployments();

            // Events
            renderEvents();

            document.getElementById('syncStatus').textContent = new Date().toLocaleTimeString();
        }

        // Render deployment cards
        function renderDeployments() {
            const container = document.getElementById('deploymentsContainer');
            container.innerHTML = '';

            dashboardData.deployments.forEach(deployment => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.style.cursor = 'pointer';

                const statusClass = deployment.status === 'offline' ? 'offline' : deployment.status === 'degraded' ? 'degraded' : '';
                const statusColor = deployment.status === 'offline' ? '#ef4444' : deployment.status === 'degraded' ? '#f59f00' : '#22c55e';

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">${deployment.name}</div>
                        <div class="card-status ${statusClass}" style="background: ${statusColor}"></div>
                    </div>
                    <div class="card-metrics">
                        <div class="metric-item">
                            <div class="metric-label">Uptime</div>
                            <div class="metric-value">${deployment.uptime_percent.toFixed(1)}%</div>
                            <div class="metric-bar">
                                <div class="metric-bar-fill" style="width: ${deployment.uptime_percent}%"></div>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Status</div>
                            <div class="metric-value">${deployment.status.toUpperCase()}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Alerts</div>
                            <div class="metric-value">${deployment.pending_alerts}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Last Sync</div>
                            <div class="metric-value">${deployment.last_sync ? new Date(deployment.last_sync).toLocaleTimeString() : 'Never'}</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        Click to view detailed admin dashboard →
                    </div>
                `;

                card.onclick = () => {
                    // TODO: Navigate to detailed admin dashboard for this deployment
                    alert(`Opening admin dashboard for ${deployment.name}\n\nFeature coming soon - would drill down to port 8001 dashboard`);
                    // window.location.href = `http://${deployment.host}:8001`;
                };

                container.appendChild(card);
            });
        }

        // Render events
        function renderEvents() {
            const container = document.getElementById('eventsContainer');
            container.innerHTML = '';

            if (dashboardData.critical_events.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #64748b;">No recent events</div>';
                return;
            }

            dashboardData.critical_events.slice(0, 20).forEach(event => {
                const item = document.createElement('div');
                item.className = 'event-item';

                const timestamp = new Date(event.timestamp).toLocaleString();

                item.innerHTML = `
                    <div class="event-content">
                        <div class="event-type">${event.deployment_id}</div>
                        <div class="event-message">${event.message}</div>
                    </div>
                    <span class="event-severity ${event.severity}">${event.severity}</span>
                    <div class="event-time">${timestamp}</div>
                `;

                container.appendChild(item);
            });
        }

        // Periodic refresh
        function startAutoRefresh() {
            fetchDashboardData();
            setInterval(fetchDashboardData, 5000); // Refresh every 5 seconds for demo
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initializeParticles();
            startAutoRefresh();
        });
    </script>
</body>
</html>
